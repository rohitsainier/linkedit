<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --li-blue: #0a66c2;
    --li-blue-hover: #004182;
    --li-blue-light: #e8f3ff;
    --li-bg: #f3f2ef;
    --li-surface: #ffffff;
    --li-border: #e0dfdc;
    --li-text: #191919;
    --li-text2: #666666;
    --li-text3: #00000099;
    --li-green: #057642;
    --li-green-light: #e8f8ef;
    --li-orange: #b24020;
    --li-red: #cc1016;
    --li-shadow: 0 0 0 1px rgba(0,0,0,0.08), 0 4px 12px rgba(0,0,0,0.05);
    --li-shadow-hover: 0 0 0 1px rgba(0,0,0,0.08), 0 8px 24px rgba(0,0,0,0.12);
    --li-radius: 8px;
    --li-radius-lg: 12px;
    --li-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
  }

  body {
    width: 460px;
    max-height: 600px;
    font-family: var(--li-font);
    background: var(--li-bg);
    color: var(--li-text);
    overflow-y: auto;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Header ─── */
  .header {
    background: linear-gradient(135deg, #0a66c2 0%, #0077b5 50%, #004182 100%);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .logo {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 14px; color: #fff;
    letter-spacing: -0.5px;
    border: 1px solid rgba(255,255,255,0.25);
  }
  .header-text h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: #fff;
  }
  .header-text p {
    font-size: 11.5px;
    color: rgba(255,255,255,0.75);
    font-weight: 500;
    margin-top: 1px;
  }

  /* ─── Tabs ─── */
  .tabs {
    display: flex;
    gap: 0;
    padding: 0 20px;
    background: var(--li-surface);
    border-bottom: 1px solid var(--li-border);
  }
  .tab {
    flex: 1;
    padding: 12px 4px 10px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--li-text3);
    cursor: pointer;
    border: none;
    border-bottom: 2px solid transparent;
    background: none;
    font-family: var(--li-font);
    transition: color 0.2s, border-color 0.2s;
    position: relative;
  }
  .tab:hover {
    color: var(--li-text);
    background: rgba(0,0,0,0.03);
  }
  .tab.active {
    color: var(--li-blue);
    border-bottom-color: var(--li-blue);
    background: none;
  }

  /* ─── Panels ─── */
  .panel {
    display: none;
    padding: 16px 20px 20px;
    animation: panelIn 0.2s ease;
  }
  .panel.active { display: block; }
  @keyframes panelIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── Editor Area ─── */
  .editor-wrap {
    position: relative;
    margin-bottom: 12px;
  }
  textarea {
    width: 100%;
    min-height: 140px;
    padding: 14px;
    border: none;
    border-radius: var(--li-radius);
    font-family: var(--li-font);
    font-size: 14px;
    line-height: 1.6;
    color: var(--li-text);
    background: var(--li-surface);
    box-shadow: var(--li-shadow);
    resize: vertical;
    transition: box-shadow 0.2s;
    outline: none;
  }
  textarea:focus {
    box-shadow: 0 0 0 2px var(--li-blue), 0 4px 12px rgba(10,102,194,0.1);
  }
  textarea::placeholder {
    color: var(--li-text3);
    font-weight: 400;
  }

  .editor-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    padding: 0 2px;
  }
  .char-count {
    font-size: 12px;
    font-weight: 500;
    color: var(--li-text3);
    font-family: var(--li-font);
    font-variant-numeric: tabular-nums;
  }
  .char-count.warn { color: var(--li-orange); font-weight: 600; }
  .char-count.over { color: var(--li-red); font-weight: 700; }

  /* ─── Section Labels ─── */
  .section-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--li-text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 16px 0 10px;
    padding-bottom: 4px;
  }
  .section-label:first-child { margin-top: 0; }

  /* ─── Format Toolbar ─── */
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 14px;
  }
  .tool-btn {
    padding: 7px 14px;
    border: 1px solid var(--li-border);
    border-radius: 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--li-text2);
    background: var(--li-surface);
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: var(--li-font);
    white-space: nowrap;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .tool-btn:hover {
    border-color: var(--li-blue);
    color: #fff;
    background: var(--li-blue);
    box-shadow: 0 2px 8px rgba(10,102,194,0.25);
  }
  .tool-btn:active { transform: scale(0.95); }

  /* ─── Separator Grid ─── */
  .sep-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 12px;
  }
  .sep-btn {
    padding: 9px 4px;
    border: 1px solid var(--li-border);
    border-radius: var(--li-radius);
    font-size: 11px;
    text-align: center;
    background: var(--li-surface);
    cursor: pointer;
    font-family: var(--li-font);
    transition: all 0.2s ease;
    color: var(--li-text2);
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .sep-btn:hover {
    border-color: var(--li-blue);
    color: var(--li-blue);
    background: var(--li-blue-light);
    box-shadow: 0 2px 6px rgba(10,102,194,0.12);
  }

  /* ─── Hashtags ─── */
  .hashtag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }
  .hashtag {
    padding: 5px 12px;
    border-radius: 16px;
    font-size: 12px;
    font-weight: 600;
    background: var(--li-surface);
    color: var(--li-blue);
    cursor: pointer;
    transition: all 0.2s ease;
    border: 1px solid var(--li-border);
    font-family: var(--li-font);
  }
  .hashtag:hover {
    background: var(--li-blue);
    color: #fff;
    border-color: var(--li-blue);
    box-shadow: 0 2px 8px rgba(10,102,194,0.25);
  }

  /* ─── Action Buttons ─── */
  .actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  .btn-primary {
    flex: 1;
    padding: 12px 20px;
    background: var(--li-blue);
    color: #fff;
    border: none;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
    font-family: var(--li-font);
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 2px 8px rgba(10,102,194,0.2);
  }
  .btn-primary:hover {
    background: var(--li-blue-hover);
    box-shadow: 0 4px 16px rgba(10,102,194,0.35);
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary {
    padding: 12px 20px;
    background: var(--li-surface);
    color: var(--li-blue);
    border: 1.5px solid var(--li-blue);
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
    font-family: var(--li-font);
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-secondary:hover {
    background: var(--li-blue-light);
    border-color: var(--li-blue-hover);
  }

  .btn-success {
    background: var(--li-green) !important;
    box-shadow: 0 2px 8px rgba(5,118,66,0.25) !important;
  }

  /* ─── Emoji Grid ─── */
  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 3px;
    margin-bottom: 12px;
  }
  .emoji-btn {
    width: 100%;
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    border: none;
    background: none;
    border-radius: var(--li-radius);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .emoji-btn:hover {
    background: var(--li-blue-light);
    transform: scale(1.2);
    box-shadow: 0 2px 8px rgba(10,102,194,0.12);
  }

  /* ─── Emoji Categories ─── */
  .emoji-cats {
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
    overflow-x: auto;
    padding-bottom: 2px;
  }
  .emoji-cat {
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--li-border);
    background: var(--li-surface);
    border-radius: 16px;
    cursor: pointer;
    flex-shrink: 0;
    font-family: var(--li-font);
    transition: all 0.2s ease;
    color: var(--li-text2);
  }
  .emoji-cat:hover {
    border-color: var(--li-blue);
    color: var(--li-blue);
    background: var(--li-blue-light);
  }
  .emoji-cat.active {
    background: var(--li-blue);
    color: #fff;
    border-color: var(--li-blue);
  }

  /* ─── Template Cards ─── */
  .template-card {
    background: var(--li-surface);
    border: none;
    border-radius: var(--li-radius-lg);
    padding: 14px 16px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: var(--li-shadow);
  }
  .template-card:hover {
    box-shadow: var(--li-shadow-hover);
    transform: translateY(-2px);
  }
  .template-card h3 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--li-text);
  }
  .template-card p {
    font-size: 12px;
    color: var(--li-text2);
    line-height: 1.55;
    white-space: pre-line;
  }
  .template-tag {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .template-tag.hook { background: #fef3c7; color: #92400e; }
  .template-tag.story { background: var(--li-blue-light); color: var(--li-blue); }
  .template-tag.list { background: var(--li-green-light); color: var(--li-green); }
  .template-tag.cta { background: #fce7f3; color: #9d174d; }

  /* ─── Preview Box ─── */
  .preview-box {
    background: var(--li-surface);
    border: none;
    border-radius: var(--li-radius-lg);
    padding: 16px;
    font-size: 14px;
    line-height: 1.6;
    color: var(--li-text);
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 120px;
    max-height: 320px;
    overflow-y: auto;
    box-shadow: var(--li-shadow);
  }

  /* ─── Toast ─── */
  .toast {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--li-text);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 22px;
    border-radius: 20px;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
    z-index: 99;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    font-family: var(--li-font);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─── Scrollbar ─── */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #c7c5c0; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #a8a6a1; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Le</div>
  <div class="header-text">
    <h1>LinkeEdit</h1>
    <p>Format posts that stand out</p>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="format">Format</button>
  <button class="tab" data-tab="emoji">Emojis</button>
  <button class="tab" data-tab="templates">Templates</button>
  <button class="tab" data-tab="preview">Preview</button>
</div>

<!-- FORMAT TAB -->
<div class="panel active" id="tab-format">
  <div class="section-label">Your post</div>
  <div class="editor-wrap">
    <textarea id="mainEditor" placeholder="Write or paste your LinkedIn post here..."></textarea>
    <div class="editor-footer">
      <span class="char-count" id="charCount">0 / 3,000</span>
      <span class="char-count" id="lineCount">0 lines</span>
    </div>
  </div>

  <div class="section-label">Text styles (Unicode)</div>
  <div class="toolbar" id="fontToolbar">
    <button class="tool-btn" data-font="bold" title="Bold text">𝗕 Bold</button>
    <button class="tool-btn" data-font="italic" title="Italic text">𝘐 Italic</button>
    <button class="tool-btn" data-font="boldItalic" title="Bold italic">𝘽𝙄</button>
    <button class="tool-btn" data-font="monospace" title="Monospace">𝙼 Mono</button>
    <button class="tool-btn" data-font="script" title="Script font">𝒮𝒸𝓇𝒾𝓅𝓉</button>
    <button class="tool-btn" data-font="fraktur" title="Fraktur / Gothic">𝔉𝔯𝔞𝔨𝔱𝔲𝔯</button>
    <button class="tool-btn" data-font="doubleStruck" title="Double-struck">𝔻𝕓𝕝</button>
    <button class="tool-btn" data-font="circled" title="Circled letters">Ⓒⓘⓡⓒ</button>
    <button class="tool-btn" data-font="squared" title="Squared letters">🅂🅀🅁</button>
    <button class="tool-btn" data-font="smallCaps" title="Small caps">ꜱᴍᴀʟʟ</button>
    <button class="tool-btn" data-font="strikethrough" title="Strikethrough">S̶t̶r̶i̶k̶e̶</button>
    <button class="tool-btn" data-font="underline" title="Underline">U̲n̲d̲e̲r̲</button>
  </div>

  <div class="section-label">Separators & Bullets</div>
  <div class="sep-grid" id="sepGrid">
    <button class="sep-btn" data-sep="─────────">━━━━</button>
    <button class="sep-btn" data-sep="• ">• Bullet</button>
    <button class="sep-btn" data-sep="→ ">→ Arrow</button>
    <button class="sep-btn" data-sep="✦ ">✦ Star</button>
    <button class="sep-btn" data-sep="▸ ">▸ Play</button>
    <button class="sep-btn" data-sep="◆ ">◆ Diamond</button>
    <button class="sep-btn" data-sep="⟡ ">⟡ Sparkle</button>
    <button class="sep-btn" data-sep="│ ">│ Line</button>
    <button class="sep-btn" data-sep="◇ ">◇ Hollow</button>
    <button class="sep-btn" data-sep="⁃ ">⁃ Dash</button>
    <button class="sep-btn" data-sep="꘎꘎꘎꘎꘎꘎꘎꘎꘎">꘎꘎꘎꘎</button>
    <button class="sep-btn" data-sep="⌁⌁⌁⌁⌁⌁⌁⌁⌁">⌁⌁⌁⌁</button>
  </div>

  <div class="section-label">Quick hashtags</div>
  <div class="hashtag-row" id="hashtagRow">
    <button class="hashtag">#Leadership</button>
    <button class="hashtag">#Startups</button>
    <button class="hashtag">#Tech</button>
    <button class="hashtag">#AI</button>
    <button class="hashtag">#Productivity</button>
    <button class="hashtag">#Growth</button>
    <button class="hashtag">#Career</button>
    <button class="hashtag">#SaaS</button>
    <button class="hashtag">#Marketing</button>
    <button class="hashtag">#Design</button>
    <button class="hashtag">#WebDev</button>
    <button class="hashtag">#Hiring</button>
  </div>

  <div class="actions">
    <button class="btn-primary" id="copyBtn">Copy to Clipboard</button>
    <button class="btn-secondary" id="clearBtn">Clear</button>
  </div>
</div>

<!-- EMOJI TAB -->
<div class="panel" id="tab-emoji">
  <div class="emoji-cats" id="emojiCats"></div>
  <div class="emoji-grid" id="emojiGrid"></div>
  <div class="section-label" style="margin-top:8px">Click to insert at cursor or append to post</div>
</div>

<!-- TEMPLATES TAB -->
<div class="panel" id="tab-templates">
  <div class="section-label">Hook starters</div>
  <div id="hookTemplates"></div>

  <div class="section-label">Post frameworks</div>
  <div id="frameworkTemplates"></div>
</div>

<!-- PREVIEW TAB -->
<div class="panel" id="tab-preview">
  <div class="section-label">LinkedIn preview</div>
  <div class="preview-box" id="previewBox">Start typing in the Format tab to see a preview...</div>
  <div class="editor-footer" style="margin-top:8px">
    <span class="char-count" id="previewCharCount">0 / 3,000</span>
  </div>
  <div class="actions">
    <button class="btn-primary" id="previewCopyBtn">Copy to Clipboard</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
