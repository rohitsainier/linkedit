<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --blue: #0a66c2;
    --blue-h: #004182;
    --blue-l: #e8f3ff;
    --bg: #f3f2ef;
    --sf: #ffffff;
    --bd: #e0dfdc;
    --t1: #191919;
    --t2: #666666;
    --t3: #00000099;
    --green: #057642;
    --red: #cc1016;
    --r: 8px;
    --f: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  body {
    width: 360px;
    font-family: var(--f);
    background: var(--bg);
    color: var(--t1);
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Header ─── */
  .header {
    background: linear-gradient(135deg, #0a66c2 0%, #004182 100%);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo {
    width: 28px; height: 28px;
    background: rgba(255,255,255,0.2);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 11px; color: #fff;
    letter-spacing: -0.5px;
  }
  .header h1 { font-size: 14px; font-weight: 700; color: #fff; }
  .header-sub { font-size: 10px; color: rgba(255,255,255,0.7); font-weight: 500; }

  /* ─── Section ─── */
  .section {
    background: var(--sf);
    padding: 14px 16px;
    border-bottom: 1px solid var(--bd);
  }
  .s-label {
    font-size: 11px; font-weight: 700; color: var(--t2);
    text-transform: uppercase; letter-spacing: 0.4px;
    margin-bottom: 6px; display: block;
  }
  .s-url-row { display: flex; gap: 6px; margin-bottom: 4px; }
  .s-input {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid var(--bd);
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--f);
    color: var(--t1);
    outline: none;
  }
  .s-input:focus { border-color: var(--blue); }
  .s-fetch-btn {
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 600;
    background: var(--sf);
    color: var(--blue);
    border: 1px solid var(--blue);
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    font-family: var(--f);
  }
  .s-fetch-btn:hover { background: var(--blue-l); }
  .settings-status { font-size: 11px; font-weight: 500; margin: 4px 0 10px; min-height: 16px; }
  .settings-status.ok { color: var(--green); }
  .settings-status.err { color: var(--red); }
  .s-select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--bd);
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--f);
    color: var(--t1);
    outline: none; cursor: pointer;
  }
  .s-select:disabled { background: var(--bg); color: var(--t3); cursor: not-allowed; }

  /* Toggle switch */
  .toggle-wrap { position: relative; display: inline-block; width: 36px; height: 20px; }
  .toggle-wrap input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
    background: #ccc; border-radius: 20px; transition: 0.2s;
  }
  .toggle-slider::before {
    content: ''; position: absolute; height: 16px; width: 16px;
    left: 2px; bottom: 2px; background: white; border-radius: 50%; transition: 0.2s;
  }
  .toggle-wrap input:checked + .toggle-slider { background: #057642; }
  .toggle-wrap input:checked + .toggle-slider::before { transform: translateX(16px); }

  .s-save {
    width: 100%;
    margin-top: 14px;
    padding: 10px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    font-family: var(--f);
    cursor: pointer;
  }
  .s-save:hover { background: var(--blue-h); }

  /* Info banner */
  .info-banner {
    background: var(--blue-l);
    border: 1px solid #bbd9f7;
    border-radius: var(--r);
    padding: 10px 12px;
    font-size: 11px;
    line-height: 1.5;
    color: var(--blue-h);
    margin-bottom: 12px;
  }
  .info-banner strong { font-weight: 700; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--t1);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 16px;
    opacity: 0;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
    z-index: 99;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    font-family: var(--f);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Lc</div>
  <div>
    <h1>LinkedComment</h1>
    <div class="header-sub">Settings</div>
  </div>
</div>

<!-- OLLAMA SETTINGS -->
<div class="section">
  <div class="info-banner">
    <strong>How it works:</strong> Scroll your LinkedIn feed. Trending posts get a green badge. Click it to generate AI comments inline — no need to open this popup!
  </div>

  <label class="s-label">Ollama Server URL</label>
  <div class="s-url-row">
    <input type="text" id="ollamaUrl" class="s-input" value="http://localhost:11434" placeholder="http://localhost:11434">
    <button class="s-fetch-btn" id="fetchModelsBtn">Fetch Models</button>
  </div>
  <div class="settings-status" id="ollamaStatus"></div>

  <label class="s-label">Model</label>
  <select id="ollamaModel" class="s-select" disabled>
    <option value="">Fetch models first...</option>
  </select>
</div>

<!-- HIGH-REACH DETECTOR -->
<div class="section">
  <label class="s-label">Trending Post Detector</label>
  <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
    <span style="font-size: 12px; color: var(--t1);">Detect high-reach posts</span>
    <label class="toggle-wrap">
      <input type="checkbox" id="highReachToggle" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <label class="s-label">Thresholds (badge if any exceeded)</label>
  <div style="display: flex; gap: 6px; margin-bottom: 4px;">
    <div style="flex: 1;">
      <div style="font-size: 10px; color: var(--t2); margin-bottom: 3px;">Reactions</div>
      <input type="number" id="threshReactions" class="s-input" value="100" min="0" style="width: 100%; text-align: center;">
    </div>
    <div style="flex: 1;">
      <div style="font-size: 10px; color: var(--t2); margin-bottom: 3px;">Comments</div>
      <input type="number" id="threshComments" class="s-input" value="20" min="0" style="width: 100%; text-align: center;">
    </div>
    <div style="flex: 1;">
      <div style="font-size: 10px; color: var(--t2); margin-bottom: 3px;">Reposts</div>
      <input type="number" id="threshReposts" class="s-input" value="10" min="0" style="width: 100%; text-align: center;">
    </div>
  </div>
  <div style="font-size: 10px; color: var(--t2); margin-top: 6px; line-height: 1.4;">
    🟢 <strong>Trending</strong> &nbsp;|&nbsp;
    🟠 <strong>Hot</strong> (score 1K+) &nbsp;|&nbsp;
    🔴 <strong>Viral</strong> (score 5K+)
  </div>

  <button class="s-save" id="saveSettingsBtn">Save Settings</button>
</div>

<div class="toast" id="toast"></div>

<script src="popup.js"></script>
</body>
</html>
